services:
  mysql:
    image: mysql:8.0
    container_name: cv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    container_name: cv-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
    cpus: ${OLLAMA_CPU_LIMIT:-8.0}
    mem_limit: ${OLLAMA_MEM_LIMIT:-12g}
    mem_reservation: ${OLLAMA_MEM_RESERVATION:-6g}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: cv-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b}
      - OLLAMA_ROUTER_MODEL=${OLLAMA_ROUTER_MODEL:-llama3.2:1b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120000}
      - OLLAMA_GENERATE_TIMEOUT=${OLLAMA_GENERATE_TIMEOUT:-120000}
      - OLLAMA_FALLBACK_TIMEOUT=${OLLAMA_FALLBACK_TIMEOUT:-150000}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-180}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-2048}
      - OLLAMA_FALLBACK_NUM_CTX=${OLLAMA_FALLBACK_NUM_CTX:-1536}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.2}
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-6}
      - OLLAMA_EMBEDDING_KEEP_ALIVE=${OLLAMA_EMBEDDING_KEEP_ALIVE:-60m}
      - OLLAMA_RETRY_ATTEMPTS=${OLLAMA_RETRY_ATTEMPTS:-1}
      - OLLAMA_RETRY_BASE_DELAY_MS=${OLLAMA_RETRY_BASE_DELAY_MS:-1200}
      - CHROMA_URL=http://chromadb:8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - EMBEDDING_INDEX_BATCH_SIZE=${EMBEDDING_INDEX_BATCH_SIZE:-12}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_TIMEOUT=${GEMINI_TIMEOUT:-60000}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
  ollama_data:
  chroma_data:

networks:
  app-network:
    driver: bridge
