services:
  mysql:
    image: mysql:8.0
    container_name: cv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  ollama:
    # Solo embeddings â€” nomic-embed-text (~270MB).
    # NO se carga ningĂşn modelo LLM (mistral, llama, etc.).
    # El LLM lo provee Gemini (cloud). Ollama solo genera vectores localmente.
    image: ollama/ollama:latest
    container_name: cv-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_EMBEDDING_KEEP_ALIVE:-60m}
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=0
    cpus: "2.0"
    mem_limit: "2g"
    mem_reservation: "512m"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: cv-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBEDDING_KEEP_ALIVE=${OLLAMA_EMBEDDING_KEEP_ALIVE:-60m}
      - CHROMA_URL=http://chromadb:8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - EMBEDDING_INDEX_BATCH_SIZE=${EMBEDDING_INDEX_BATCH_SIZE:-12}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_TIMEOUT=${GEMINI_TIMEOUT:-10000}
      - GEMINI_COOLDOWN_MS=${GEMINI_COOLDOWN_MS:-30000}
      - GEMINI_RETRY_DELAY_MS=${GEMINI_RETRY_DELAY_MS:-1500}
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - PORT=3000
      - NODE_ENV=production
      - NO_PROXY=localhost,127.0.0.1,mysql,ollama,chromadb
      - no_proxy=localhost,127.0.0.1,mysql,ollama,chromadb
      - HTTPS_PROXY=
      - https_proxy=
      - HTTP_PROXY=
      - http_proxy=
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
  ollama_data:
  chroma_data:

networks:
  app-network:
    driver: bridge
